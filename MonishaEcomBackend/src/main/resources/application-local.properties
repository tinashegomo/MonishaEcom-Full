spring.datasource.url=jdbc:mysql://localhost:3306/monisha_ecom
spring.datasource.username=root
spring.datasource.password=pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Ecom JWT secret (separate from IMS staff JWT)
SecretJwtString=ecom-jwt-secret-monisha-2024-keep-it-very-long-and-secure

server.port=8081

# IMS API keys for server-to-server communication
ims.base-url=http://localhost:8080
ims.api-keys.ecom-catalog=ecom-catalog-key-monisha-2024
ims.api-keys.ecom-customers=ecom-customers-key-monisha-2024
ims.api-keys.ecom-orders=ecom-orders-key-monisha-2024
